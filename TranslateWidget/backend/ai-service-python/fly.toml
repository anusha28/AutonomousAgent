app = "your-app-ai-service"
primary_region = "iad"

[build]

[env]
  TRANSLATION_DB_PATH = "/data/translations.db"

[mounts]
  source = "translate_cache_db"
  destination = "/data"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    path = "/health"
    interval = "15s"
    timeout = "5s"
